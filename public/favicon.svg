  <path d="M20 30 C20 24 24 20 29 21 C29 21 28 24 30 26 C30 26 27 27 27 30 C27 33 29 34 29 34 C26 35 20 36 20 30 Z"
        fill="none" stroke="#00BFB3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Brain right hemisphere -->
  <path d="M44 30 C44 24 40 20 35 21 C35 21 36 24 34 26 C34 26 37 27 37 30 C37 33 35 34 35 34 C38 35 44 36 44 30 Z"
        fill="none" stroke="#00BFB3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Center divider -->
  <line x1="32" y1="21" x2="32" y2="34" stroke="#00BFB3" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- Brain stem -->
  <path d="M29 34 C29 36 30 38 32 38 C34 38 35 36 35 34"
        fill="none" stroke="#00BFB3" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Neural dots (memory nodes) -->
  <circle cx="24" cy="27" r="1.5" fill="#00BFB3"/>
  <circle cx="24" cy="32" r="1.5" fill="#00BFB3"/>
  <circle cx="40" cy="27" r="1.5" fill="#00BFB3"/>
  <circle cx="40" cy="32" r="1.5" fill="#00BFB3"/>
  <!-- Pulse line at bottom -->
  <polyline points="18,46 22,46 24,42 27,50 30,44 33,48 36,44 39,50 42,42 44,46 46,46"
            fill="none" stroke="#00BFB3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
